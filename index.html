<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極限洗窗工 - 終極大滿貫版</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0c4a6e; font-family: sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 12px 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .ui-text { color: #fff; font-size: 14px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; z-index: 10; }
        .overlay.hidden { display: none; }
        .btn { background: #eab308; color: #0f172a; border: 3px solid #0f172a; padding: 10px 25px; font-size: 18px; font-weight: bold; border-radius: 12px; box-shadow: 3px 3px 0px #0f172a; cursor: pointer; pointer-events: auto; margin-top: 15px; }
        .btn:disabled { background: #64748b; cursor: not-allowed; }
        
        #audio-btn { background: rgba(15, 23, 42, 0.8); color: #fff; border: 2px solid #38bdf8; padding: 4px 8px; border-radius: 18px; font-size: 12px; font-weight: bold; cursor: pointer; pointer-events: auto; margin-top: 4px; }
        #item-toast { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(234, 179, 8, 0.95); color: #0f172a; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 8; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* 商店樣式 */
        .shop-box { background: rgba(30, 41, 59, 0.9); border: 2px solid #eab308; border-radius: 12px; padding: 15px; margin: 10px 0; width: 90%; max-width: 350px; text-align: left; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .shop-btn { background: #38bdf8; border: none; padding: 6px 12px; font-weight: bold; border-radius: 6px; cursor: pointer; color: #0f172a; }
        .shop-btn:disabled { background: #475569; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div>
            <div id="score-box" class="ui-text">SCORE: 00000</div>
            <div id="clean-box" class="ui-text" style="color: #4ade80;">CLEAN: 0%</div>
            <div id="combo-box" class="ui-text" style="color: #facc15;">COMBO: x0</div>
        </div>
        <div style="text-align: right;">
            <div id="level-box" class="ui-text">LEVEL: 1</div>
            <div id="time-box" class="ui-text">TIME: 60</div>
            <div id="coin-box" class="ui-text" style="color: #fef08a;">💰 0</div>
            <button id="audio-btn">🔊 音效：開</button>
        </div>
    </div>

    <div id="item-toast">獲得提示！</div>

    <!-- 開始畫面 -->
    <div id="start-overlay" class="overlay">
        <h1>極限洗窗工：終極版</h1>
        <p>⚡ 風暴、濃霧、蜜蜂與飛鳥來襲！<br>💰 賺取金幣升級裝備！<br>🔥 保持連續擦拭開啟 Combo 加分！</p>
        <button id="start-btn" class="btn">開始挑戰</button>
    </div>

    <!-- 通關與商店畫面 -->
    <div id="complete-overlay" class="overlay hidden">
        <h2 id="complete-text" style="color: #4ade80; margin: 5px;">第 1 關完成！</h2>
        <div id="achievement-text" style="color: #fef08a; font-weight: bold; margin-bottom: 5px;"></div>
        
        <div class="shop-box">
            <div style="text-align: center; font-weight: bold; color: #eab308; margin-bottom: 10px;">🛠️ 裝備升級商店</div>
            <div class="shop-item">
                <span>🧹 大號刮棒 (+5範圍)</span>
                <button id="buy-squeegee" class="shop-btn">💰 150</button>
            </div>
            <div class="shop-item">
                <span>🛡️ 防護罩 (抵擋一次撞擊)</span>
                <button id="buy-shield" class="shop-btn">💰 200</button>
            </div>
            <div class="shop-item">
                <span>🧲 道具磁鐵 (自動吸引)</span>
                <button id="buy-magnet" class="shop-btn">💰 250</button>
            </div>
        </div>

        <button id="next-btn" class="btn">前往下一關</button>
    </div>

    <!-- 遊戲結束畫面 -->
    <div id="over-overlay" class="overlay hidden">
        <h1 style="color: #f87171;">時間到！</h1>
        <h2 id="final-stats">你爬到了 0 樓</h2>
        <button id="restart-btn" class="btn">重新挑戰</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- Web Audio API 純程式碼音樂引擎 ---
        let audioCtx = null, isAudioMuted = false, bgmTimer = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (isAudioMuted || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'wipe') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                    gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'hit') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'item') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.08);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'combo') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1600, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'win') {
                    [440, 554.37, 659.25, 880].forEach((freq, idx) => {
                        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(freq, now + idx * 0.1);
                        g.gain.setValueAtTime(0.2, now + idx * 0.1);
                        g.gain.linearRampToValueAtTime(0.01, now + idx * 0.1 + 0.15);
                        o.start(now + idx * 0.1); o.stop(now + idx * 0.1 + 0.15);
                    });
                }
            } catch(e){}
        }

        const bgmNotes = [261, 329, 392, 329, 293, 349, 440, 349, 329, 392, 523, 392, 293, 349, 392, 293];
        let bgmNoteIndex = 0;

        function startBGM() {
            stopBGM();
            bgmTimer = setInterval(() => {
                if (!isAudioMuted && gameState === 'playing' && audioCtx) {
                    try {
                        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.type = 'sine'; osc.frequency.setValueAtTime(bgmNotes[bgmNoteIndex], audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
                        osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.18);
                        bgmNoteIndex = (bgmNoteIndex + 1) % bgmNotes.length;
                    } catch(e){}
                }
            }, 220);
        }
        function stopBGM() { if (bgmTimer) clearInterval(bgmTimer); }

        // --- 核心變數 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const dirtCanvas = document.createElement('canvas');
        const dirtCtx = dirtCanvas.getContext('2d');
        const fogCanvas = document.createElement('canvas');
        const fogCtx = fogCanvas.getContext('2d');

        const startOverlay = document.getElementById('start-overlay');
        const completeOverlay = document.getElementById('complete-overlay');
        const overOverlay = document.getElementById('over-overlay');
        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const itemToast = document.getElementById('item-toast');
        const audioBtn = document.getElementById('audio-btn');

        let gameState = 'start', score = 0, coins = 0, currentLevel = 1, timeLeft = 60, timerInterval = null;
        let stickman = { x: 0, y: 0, targetX: 0, targetY: 0 };
        let isDrawing = false, windows = [], items = [], obstacles = [], beehives = [];
        let wallX, wallY, wallW, wallH;
        let totalDirtPixels = 0, cleanedProgress = 0;
        
        // 商店與裝備屬性
        let baseWipeRadius = 28, wipeRadius = 28;
        let hasShield = false, hasMagnet = false;
        let comboCount = 0, comboTimer = null, hitCountThisLevel = 0;
        let windOffset = 0, windTime = 0;

        audioBtn.addEventListener('click', () => {
            isAudioMuted = !isAudioMuted;
            audioBtn.textContent = isAudioMuted ? "🔇 音效：關" : "🔊 音效：開";
        });

        // --- 商店按鈕事件 ---
        document.getElementById('buy-squeegee').addEventListener('click', () => {
            if (coins >= 150) {
                coins -= 150; baseWipeRadius += 5; updateUI();
                showToast("🧹 刮棒範圍永久增加！");
                document.getElementById('buy-squeegee').disabled = true;
            }
        });
        document.getElementById('buy-shield').addEventListener('click', () => {
            if (coins >= 200 && !hasShield) {
                coins -= 200; hasShield = true; updateUI();
                showToast("🛡️ 防護罩裝備成功！");
                document.getElementById('buy-shield').disabled = true;
            }
        });
        document.getElementById('buy-magnet').addEventListener('click', () => {
            if (coins >= 250 && !hasMagnet) {
                coins -= 250; hasMagnet = true; updateUI();
                showToast("🧲 道具磁鐵裝備成功！");
                document.getElementById('buy-magnet').disabled = true;
            }
        });

        function updateUI() {
            document.getElementById('score-box').textContent = `SCORE: ${String(score).padStart(5, '0')}`;
            document.getElementById('coin-box').textContent = `💰 ${coins}`;
            document.getElementById('combo-box').textContent = `COMBO: x${comboCount}`;
            
            // 商店按鈕狀態更新
            document.getElementById('buy-squeegee').disabled = coins < 150;
            document.getElementById('buy-shield').disabled = coins < 200 || hasShield;
            document.getElementById('buy-magnet').disabled = coins < 250 || hasMagnet;
        }

        function getLevelTimeLimit() {
            return Math.max(35, 65 - currentLevel * 3);
        }

        function runTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === 'playing') {
                    timeLeft--; 
                    document.getElementById('time-box').textContent = `TIME: ${timeLeft}`;
                    
                    if (currentLevel >= 4 && Math.random() < 0.4) {
                        obstacles.push({ x: -30, y: wallY + Math.random() * wallH, speed: 3 + Math.random() * 3 });
                    }

                    if (timeLeft <= 0) { 
                        gameState = 'gameover'; 
                        clearInterval(timerInterval); 
                        stopBGM();
                        document.getElementById('final-stats').textContent = `你爬到了 ${currentLevel} 樓`;
                        overOverlay.classList.remove('hidden'); 
                    }
                }
            }, 1000);
        }

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dirtCanvas.width = canvas.width; dirtCanvas.height = canvas.height;
            fogCanvas.width = canvas.width; fogCanvas.height = canvas.height;
            wallW = canvas.width - 40; wallH = canvas.height - 140;
            wallX = 20; wallY = 90;
            stickman.x = stickman.targetX = canvas.width / 2;
            stickman.y = stickman.targetY = canvas.height * 0.7;
            initWindows();
        }

        function initWindows() {
            windows = []; items = []; obstacles = []; beehives = []; hitCountThisLevel = 0;
            const rows = Math.min(3 + Math.floor((currentLevel - 1) / 2), 6); 
            const cols = 3;
            const winW = (wallW - 30) / cols;
            const winH = (wallH - 40) / rows;
            
            dirtCtx.clearRect(0, 0, dirtCanvas.width, dirtCanvas.height);
            fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
            totalDirtPixels = 0;

            const lockChance = Math.min(0.15 + (currentLevel * 0.04), 0.45);

            // 濃霧氣候條件
            if (currentLevel >= 3 && Math.random() < 0.5) {
                fogCtx.fillStyle = 'rgba(226, 232, 240, 0.85)';
                fogCtx.fillRect(wallX, wallY, wallW, wallH);
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let wx = wallX + 15 + c * (winW + 5), wy = wallY + 15 + r * (winH + 8);
                    let isLocked = Math.random() < lockChance;
                    
                    windows.push({ x: wx, y: wy, w: winW, h: winH, locked: isLocked });
                    
                    if (!isLocked) {
                        dirtCtx.fillStyle = '#1e3a8a'; 
                        dirtCtx.fillRect(wx, wy, winW, winH);
                        
                        if (currentLevel >= 2 && Math.random() < Math.min(0.2 + currentLevel * 0.08, 0.6)) {
                            dirtCtx.fillStyle = '#b91c1c';
                            dirtCtx.fillRect(wx + 8, wy + 8, winW - 16, winH - 16);
                        }

                        // 產生蜂窩
                        if (currentLevel >= 4 && Math.random() < 0.15) {
                            beehives.push({ x: wx + winW - 15, y: wy + 15 });
                        }

                        totalDirtPixels += (winW * winH);
                    }
                }
            }

            if (Math.random() < 0.8) {
                const randomWin = windows.filter(w => !w.locked)[0];
                if (randomWin) {
                    items.push({
                        x: randomWin.x + randomWin.w / 2,
                        y: randomWin.y + randomWin.h / 2,
                        type: Math.random() < 0.5 ? 'bucket' : 'squeegee'
                    });
                }
            }

            wipeRadius = baseWipeRadius;
            calculateProgress();
        }

        function showToast(text) {
            itemToast.textContent = text; itemToast.style.opacity = 1;
            setTimeout(() => { itemToast.style.opacity = 0; }, 2000);
        }

        function calculateProgress() {
            if (totalDirtPixels === 0) return;
            let currentDirtCount = 0;
            windows.forEach(win => {
                if (!win.locked) {
                    const imgData = dirtCtx.getImageData(win.x, win.y, win.w, win.h);
                    const data = imgData.data;
                    for (let i = 3; i < data.length; i += 16) {
                        if (data[i] > 10) currentDirtCount++;
                    }
                }
            });

            const maxSampleCount = totalDirtPixels / 4;
            let percent = Math.floor(((maxSampleCount - currentDirtCount) / maxSampleCount) * 100);
            percent = Math.max(0, Math.min(100, percent));
            
            cleanedProgress = percent;
            document.getElementById('clean-box').textContent = `CLEAN: ${cleanedProgress}%`;
        }

        function updateTouch(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            stickman.targetX = clientX - rect.left; 
            stickman.targetY = clientY - rect.top;
            
            const wipeX = stickman.x + 15, wipeY = stickman.y - 35; 

            // Combo 邏輯
            if (comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => { comboCount = 0; updateUI(); }, 1200);

            // 磁鐵功能
            if (hasMagnet) {
                items.forEach(it => {
                    const dist = Math.hypot(wipeX - it.x, wipeY - it.y);
                    if (dist < 120) {
                        it.x += (wipeX - it.x) * 0.15;
                        it.y += (wipeY - it.y) * 0.15;
                    }
                });
            }

            // 道具觸碰
            items.forEach((it, index) => {
                if (Math.hypot(wipeX - it.x, wipeY - it.y) < 35) {
                    playSound('item');
                    if (it.type === 'bucket') {
                        windows.forEach(w => { if (!w.locked) dirtCtx.clearRect(w.x, w.y, w.w, w.h); });
                        showToast("🪣 水桶爆發！污垢全清！");
                    } else {
                        wipeRadius = baseWipeRadius + 22;
                        showToast("🧹 超級大刮棒！範圍倍增！");
                        setTimeout(() => { wipeRadius = baseWipeRadius; }, 8000);
                    }
                    items.splice(index, 1);
                }
            });

            // 蜂窩碰觸
            beehives.forEach((hive, idx) => {
                if (Math.hypot(wipeX - hive.x, wipeY - hive.y) < 20) {
                    playSound('hit');
                    showToast("🐝 誤觸蜂窩！視線受阻！");
                    beehives.splice(idx, 1);
                }
            });

            // 飛鳥干擾物撞擊
            obstacles.forEach((obs, index) => {
                if (Math.hypot(wipeX - obs.x, wipeY - obs.y) < 25) {
                    if (hasShield) {
                        hasShield = false;
                        playSound('item');
                        showToast("🛡️ 防護罩檔下了飛鳥！");
                        updateUI();
                    } else {
                        playSound('hit');
                        timeLeft = Math.max(1, timeLeft - 3);
                        hitCountThisLevel++;
                        showToast("🦅 遭到飛鳥撞擊！時間-3秒！");
                    }
                    obstacles.splice(index, 1);
                }
            });

            // 百葉窗誤觸
            windows.forEach(win => {
                if (win.locked && wipeX > win.x && wipeX < win.x + win.w && wipeY > win.y && wipeY < win.y + win.h) {
                    playSound('hit');
                    hitCountThisLevel++;
                    comboCount = 0;
                    score = Math.max(0, score - 2); 
                    updateUI();
                }
            });

            // 清除污垢與散霧
            dirtCtx.save(); dirtCtx.globalCompositeOperation = 'destination-out'; 
            dirtCtx.beginPath(); dirtCtx.arc(wipeX, wipeY, wipeRadius, 0, Math.PI * 2); dirtCtx.fill(); dirtCtx.restore();

            fogCtx.save(); fogCtx.globalCompositeOperation = 'destination-out'; 
            fogCtx.beginPath(); fogCtx.arc(wipeX, wipeY, wipeRadius + 10, 0, Math.PI * 2); fogCtx.fill(); fogCtx.restore();

            // 增加 Combo 與分數
            comboCount++;
            if (comboCount % 10 === 0) playSound('combo');
            score += (1 + Math.floor(comboCount / 10));
            updateUI();

            calculateProgress();
        }

        function checkLevelCompletion() {
            if (gameState !== 'playing') return;

            if (cleanedProgress >= 98) {
                gameState = 'complete';
                clearInterval(timerInterval);
                stopBGM();
                playSound('win');
                
                const earnedCoins = 50 + timeLeft * 2;
                coins += earnedCoins;
                score += (500 + timeLeft * 10);

                // 成就評定
                let achievement = "🎖️ 順利通關！";
                if (hitCountThisLevel === 0) achievement = "🌟 完美零失誤！(洗窗大師)";
                else if (timeLeft >= 25) achievement = "⚡ 極速清潔工！";

                document.getElementById('complete-text').textContent = `第 ${currentLevel} 關完成！ (+${earnedCoins}金幣)`;
                document.getElementById('achievement-text').textContent = achievement;
                
                updateUI();
                completeOverlay.classList.remove('hidden');
            }
        }

        canvas.addEventListener('pointerdown', (e) => { 
            initAudio(); if(gameState==='playing') { isDrawing = true; updateTouch(e); }
        });
        canvas.addEventListener('pointermove', (e) => { 
            if (isDrawing && gameState === 'playing') updateTouch(e);
        });
        canvas.addEventListener('pointerup', () => {
            if (isDrawing && gameState === 'playing') { isDrawing = false; checkLevelCompletion(); }
        });

        function drawSky() {
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (currentLevel <= 3) {
                grad.addColorStop(0, '#38bdf8'); grad.addColorStop(1, '#bae6fd');
            } else if (currentLevel <= 6) {
                grad.addColorStop(0, '#f97316'); grad.addColorStop(1, '#fef08a');
            } else {
                grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#3b0764');
            }
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSky();

            // 風暴搖晃計算
            if (currentLevel >= 3) {
                windTime += 0.05;
                windOffset = Math.sin(windTime) * (currentLevel * 1.5);
            }

            ctx.save();
            ctx.translate(windOffset, 0);

            ctx.fillStyle = '#b45309'; ctx.fillRect(wallX, wallY, wallW, wallH);
            
            windows.forEach(win => {
                ctx.fillStyle = win.locked ? '#ef4444' : '#fef08a';
                ctx.fillRect(win.x, win.y, win.w, win.h);
            });

            ctx.drawImage(dirtCanvas, 0, 0);
            ctx.drawImage(fogCanvas, 0, 0);

            windows.forEach(win => {
                ctx.save();
                ctx.strokeStyle = '#334155'; ctx.lineWidth = 3;
                ctx.strokeRect(win.x, win.y, win.w, win.h);
                if (win.locked) {
                    ctx.strokeStyle = '#7f1d1d'; ctx.lineWidth = 2;
                    for (let ly = win.y + 6; ly < win.y + win.h; ly += 8) { 
                        ctx.beginPath(); ctx.moveTo(win.x + 3, ly); ctx.lineTo(win.x + win.w - 3, ly); ctx.stroke(); 
                    }
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(win.x + 10, win.y + 10); ctx.lineTo(win.x + win.w - 10, win.y + win.h - 10);
                    ctx.moveTo(win.x + win.w - 10, win.y + 10); ctx.lineTo(win.x + 10, win.y + win.h - 10);
                    ctx.stroke();
                }
                ctx.restore();
            });

            beehives.forEach(hive => {
                ctx.font = "18px Arial"; ctx.fillText("🐝", hive.x, hive.y);
            });

            obstacles.forEach((obs, idx) => {
                obs.x += obs.speed;
                ctx.font = "20px Arial"; ctx.fillText("🦅", obs.x, obs.y);
                if (obs.x > canvas.width + 30) obstacles.splice(idx, 1);
            });

            items.forEach(it => {
                ctx.save(); ctx.font = "24px Arial";
                ctx.fillText(it.type === 'bucket' ? "🪣" : "🧹", it.x - 12, it.y + 8);
                ctx.restore();
            });

            stickman.x += (stickman.targetX - stickman.x) * 0.2;
            stickman.y += (stickman.targetY - stickman.y) * 0.2;
            drawHangerAndStickman(stickman.x, stickman.y);

            ctx.restore();
            requestAnimationFrame(draw);
        }

        function drawHangerAndStickman(x, y) {
            ctx.save(); 
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x-20,0); ctx.lineTo(x-20,y); ctx.moveTo(x+20,0); ctx.lineTo(x+20,y); ctx.stroke();
            ctx.fillStyle = '#dc2626'; ctx.fillRect(x-25, y, 50, 8);
            
            // 防護罩特效
            if (hasShield) {
                ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(x, y-25, 35, 0, Math.PI*2); ctx.stroke();
            }

            ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x, y-48, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y-41); ctx.lineTo(x, y-20); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y-35); ctx.lineTo(x-15, y-25); ctx.lineTo(x+15, y-25); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y-20); ctx.lineTo(x-10, y); ctx.moveTo(x, y-20); ctx.lineTo(x+10, y); ctx.stroke();
            ctx.restore();
        }

        function startGame() {
            initAudio();
            score = 0; coins = 0; currentLevel = 1; baseWipeRadius = 28;
            hasShield = false; hasMagnet = false;
            timeLeft = getLevelTimeLimit();
            updateUI();
            startOverlay.classList.add('hidden'); overOverlay.classList.add('hidden');
            gameState = 'playing'; initWindows(); runTimer(); startBGM();
        }

        function nextLevel() {
            initAudio();
            currentLevel++; 
            timeLeft = getLevelTimeLimit();
            document.getElementById('level-box').textContent = `LEVEL: ${currentLevel}`;
            document.getElementById('time-box').textContent = `TIME: ${timeLeft}`;
            completeOverlay.classList.add('hidden');
            initWindows(); gameState = 'playing'; runTimer(); startBGM();
        }

        window.addEventListener('resize', resize);
        resize();

        startBtn.addEventListener('click', startGame); 
        nextBtn.addEventListener('click', nextLevel);
        restartBtn.addEventListener('click', startGame);
        draw();
    </script>
</body>
</html>
